<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 2rem 2rem 2.2rem;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 1.8rem;
            color: #1e2a3a;
            letter-spacing: -0.3px;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 1rem;
            border: 1px solid #ccd7e6;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
            background: #fff;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: #4a6fa5;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
            font-family: inherit;
        }

        button:hover {
            background: #1e2f3c;
        }

        .message {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #a94442;
            height: 20px;
        }

        @media (max-width: 450px) {
            .login-card {
                padding: 1.5rem;
                margin: 1rem;
            }

            .login-card h2 {
                font-size: 1.5rem;
            }
        }

        .input_comp {
            display: flex;
            gap: 5px;
            padding-bottom: 1rem;
        }

        .input_comp input {
            width: 1rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>Update Todo</h2>
        <form id="loginForm" method="post">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="title" placeholder="Title" autocomplete="off" value="{{ object.title }}" required>
            </div>
            <div class="input_comp">
                <label for="">Complated</label>
                {% if object.completed %}
                    <input type="checkbox" class="todo-checkbox" name="completed" checked>
                {% else %}
                    <input type="checkbox" class="todo-checkbox" name="completed" >
                {% endif %}
            </div>
            <button type="submit">Add</button>
            <div class="message" id="formMessage"></div>
        </form>
    </div>
</body>

</html>
